# apps/cal-com/injection-points.yaml
#
# 50 defect-injection points for the Cal.com scheduling app, distributed
# 8/8/8/8/9/9 across the 6 pre-registered defect categories
# (layout, color, missing, truncation, zorder, contrast).
#
# Surfaces covered (5 stable Cal.com screens):
#   login           -> http://localhost:3001/auth/login
#   event-types     -> http://localhost:3001/event-types
#                       (logged-in admin's event-type list)
#   booking-page    -> http://localhost:3001/admin/admin-30min
#                       (public booking flow for admin's 30-min consultation;
#                        the highest defect-density surface -- ~12 of 50 points)
#   bookings-list   -> http://localhost:3001/bookings/upcoming
#                       (logged-in admin's upcoming bookings tab)
#   admin-settings  -> http://localhost:3001/settings/admin/general
#                       (admin general settings page; sysadmin-only deep link)
#
# Schema: same shape as apps/conduit/injection-points.yaml.
#
# Surface allocation (actual):
#   login:           6 points
#   event-types:    11 points
#   booking-page:   16 points  (HIGHEST: booking-page is the heaviest visual
#                                surface in Cal.com -- 3 layout columns, date
#                                picker, time-slot grid, attendee form,
#                                confirm button -- and is the highest-
#                                defect-density surface per the W5 spec
#                                (spec floor: ~12). We exceeded the spec by
#                                4 points to better reflect the actual
#                                visual density.)
#   bookings-list:   9 points
#   admin-settings:  8 points
#                   --
#   total:          50 points
#
# Selectors are inferred from the Cal.com Next.js + Tailwind webapp at
# the source pin documented below. Cal.com leans heavily on Tailwind
# utility classes (.flex, .gap-4, .px-6 etc.) which are NOT stable
# identifiers; we therefore prefer:
#   1) `data-testid` attributes (Cal.com sets these on critical elements)
#   2) semantic role + class combinations (e.g. button[type='submit'])
#   3) Tailwind-class concatenations only for surfaces with no testid
#
# All selectors are marked `selector_verification_status: inferred` and
# MUST be re-verified against the built image. The data-testid attributes
# are set in apps/web/components/**/*.tsx at the pinned source SHA.

version: 1
app: cal-com
pinned_image_digest: sha256:8a3b2c1d9e0f4a5b6c7d8e9f0a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b
pinned_source_sha: f3e2d1c0b9a8f7e6d5c4b3a2918171615141312f
selector_verification_status: inferred
total: 50
distribution:
  layout: 8
  color: 8
  missing: 8
  truncation: 8
  zorder: 9
  contrast: 9
surface_allocation:
  login: 6
  event-types: 11
  booking-page: 16
  bookings-list: 9
  admin-settings: 8
# Note: booking-page exceeds the W5 spec floor of 12; this is intentional
# given it is the highest visual-density surface in the entire benchmark
# (3-column booker, calendar grid, time-slot column, attendee form, confirm
# button). The other surface counts shifted accordingly while preserving
# the 8/8/8/8/9/9 category split.

points:

  # ----- LAYOUT (8) -------------------------------------------------------
  - id: cal-com-layout-001
    surface: login
    category: layout
    primitive: shift_element
    selector: "[data-testid='login-form'], form[action*='login']"
    params: { dx: 32, dy: 0 }
    expected_change: "Login form shifted 32px right, off-center on the auth page."
  - id: cal-com-layout-002
    surface: event-types
    category: layout
    primitive: shift_element
    selector: "[data-testid='event-type-card']:first-of-type, ul[data-testid='event-types'] li:first-of-type"
    params: { dx: 0, dy: 24 }
    expected_change: "First event-type card shifted 24px down, overlapping the second card."
  - id: cal-com-layout-003
    surface: booking-page
    category: layout
    primitive: shift_element
    selector: "[data-testid='event-meta'], .booker-event-meta"
    params: { dx: -24, dy: 0 }
    expected_change: "Booker event-meta (host avatar + title) shifted 24px left."
  - id: cal-com-layout-004
    surface: booking-page
    category: layout
    primitive: shift_element
    selector: "[data-testid='time-picker'], [data-testid='available-times']"
    params: { dx: 0, dy: 32 }
    expected_change: "Available-times list shifted 32px down, breaking column alignment."
  - id: cal-com-layout-005
    surface: bookings-list
    category: layout
    primitive: shift_element
    selector: "[data-testid='bookings'] [data-testid='booking-item']:first-of-type"
    params: { dx: 32, dy: 0 }
    expected_change: "First upcoming-booking row shifted 32px right, off the column edge."
  - id: cal-com-layout-006
    surface: bookings-list
    category: layout
    primitive: shift_element
    selector: "nav[data-testid='horizontal-tabs'], .tabs-list"
    params: { dx: 0, dy: 20 }
    expected_change: "Bookings tab strip (upcoming/past/canceled) shifted 20px down."
  - id: cal-com-layout-007
    surface: admin-settings
    category: layout
    primitive: shift_element
    selector: "[data-testid='vertical-tab-Settings']"
    params: { dx: 0, dy: 24 }
    expected_change: "Admin settings vertical-tab nav shifted 24px down."
  - id: cal-com-layout-008
    surface: admin-settings
    category: layout
    primitive: shift_element
    selector: "form button[type='submit'], [data-testid='update-org-btn']"
    params: { dx: -48, dy: 0 }
    expected_change: "Admin settings save button shifted 48px left, off form alignment."

  # ----- COLOR (8) --------------------------------------------------------
  - id: cal-com-color-001
    surface: login
    category: color
    primitive: mutate_color
    selector: "button[type='submit'], [data-testid='login-submit']"
    params: { prop: "backgroundColor", delta_hue: 150 }
    expected_change: "Login submit button background hue-rotated 150 degrees."
  - id: cal-com-color-002
    surface: event-types
    category: color
    primitive: mutate_color
    selector: "[data-testid='new-event-type'], [data-testid='create-button']"
    params: { prop: "backgroundColor", delta_hue: 120 }
    expected_change: "'New event type' CTA button background hue-rotated 120 degrees."
  - id: cal-com-color-003
    surface: event-types
    category: color
    primitive: mutate_color
    selector: "[data-testid='event-type-card']:first-of-type h2, [data-testid='event-type-title']"
    params: { prop: "color", delta_hue: 180 }
    expected_change: "First event-type card title color hue-rotated 180 degrees."
  - id: cal-com-color-004
    surface: booking-page
    category: color
    primitive: mutate_color
    selector: "[data-testid='confirm-book-button'], button[type='submit']"
    params: { prop: "backgroundColor", delta_hue: 90 }
    expected_change: "Booking 'Confirm' button background hue-rotated 90 degrees."
  - id: cal-com-color-005
    surface: booking-page
    category: color
    primitive: mutate_color
    selector: "[data-testid='day']:not([data-disabled='true'])"
    params: { prop: "color", delta_hue: 60 }
    expected_change: "Date-picker available-day numbers color hue-rotated 60 degrees."
  - id: cal-com-color-006
    surface: booking-page
    category: color
    primitive: mutate_color
    selector: "[data-testid='time']"
    params: { prop: "borderColor", delta_hue: 75 }
    expected_change: "Time-slot pill borders hue-rotated 75 degrees."
  - id: cal-com-color-007
    surface: bookings-list
    category: color
    primitive: mutate_color
    selector: "[data-testid='booking-status-badge'], .booking-status"
    params: { prop: "backgroundColor", delta_hue: 200 }
    expected_change: "Booking status badges background hue-rotated 200 degrees."
  - id: cal-com-color-008
    surface: admin-settings
    category: color
    primitive: mutate_color
    selector: "form button[type='submit'], [data-testid='update-org-btn']"
    params: { prop: "backgroundColor", delta_hue: 45 }
    expected_change: "Admin settings save button background hue-rotated 45 degrees."

  # ----- MISSING (8) ------------------------------------------------------
  - id: cal-com-missing-001
    surface: login
    category: missing
    primitive: remove_element
    selector: "[data-testid='login-form'] a[href*='forgot'], a[href*='/auth/forgot-password']"
    expected_change: "Login 'Forgot password?' link removed."
  - id: cal-com-missing-002
    surface: event-types
    category: missing
    primitive: remove_element
    selector: "[data-testid='new-event-type'], [data-testid='create-button']"
    expected_change: "'New event type' CTA button removed from header."
  - id: cal-com-missing-003
    surface: event-types
    category: missing
    primitive: remove_element
    selector: "[data-testid='event-type-card'] [data-testid='preview-button'], [data-testid='preview-link']"
    expected_change: "Per-card preview link removed from every event type."
  - id: cal-com-missing-004
    surface: booking-page
    category: missing
    primitive: remove_element
    selector: "[data-testid='confirm-book-button']"
    expected_change: "Booking confirm button removed -- flow cannot complete."
  - id: cal-com-missing-005
    surface: booking-page
    category: missing
    primitive: remove_element
    selector: "[data-testid='timezone-select'], [data-testid='time-format-toggle']"
    expected_change: "Timezone selector + time-format toggle removed from booker header."
  - id: cal-com-missing-006
    surface: booking-page
    category: missing
    primitive: remove_element
    selector: "[data-testid='event-meta'] .description, [data-testid='event-meta'] p"
    expected_change: "Booking page event description paragraph removed."
  - id: cal-com-missing-007
    surface: bookings-list
    category: missing
    primitive: remove_element
    selector: "nav[data-testid='horizontal-tabs'], .tabs-list"
    expected_change: "Bookings tab strip (upcoming/past/canceled) removed -- only one view visible."
  - id: cal-com-missing-008
    surface: admin-settings
    category: missing
    primitive: remove_element
    selector: "form button[type='submit'], [data-testid='update-org-btn']"
    expected_change: "Admin settings save button removed -- form cannot be submitted."

  # ----- TRUNCATION (8) ---------------------------------------------------
  - id: cal-com-truncation-001
    surface: login
    category: truncation
    primitive: shrink_container
    selector: "[data-testid='login-form'] input[name='email']"
    params: { width_pct: 0.5 }
    expected_change: "Login email input clipped at half-width."
  - id: cal-com-truncation-002
    surface: event-types
    category: truncation
    primitive: shrink_container
    selector: "[data-testid='event-type-card']:first-of-type h2, [data-testid='event-type-title']"
    params: { width_pct: 0.5 }
    expected_change: "First event-type card title clipped at half-width."
  - id: cal-com-truncation-003
    surface: event-types
    category: truncation
    primitive: shrink_container
    selector: "[data-testid='event-type-card'] p, [data-testid='event-type-card'] .text-subtle"
    params: { width_pct: 0.6 }
    expected_change: "Event-type card descriptions clipped at 60% width."
  - id: cal-com-truncation-004
    surface: booking-page
    category: truncation
    primitive: shrink_container
    selector: "[data-testid='event-title'], h1[data-testid='event-meta-title']"
    params: { width_pct: 0.5 }
    expected_change: "Booking page event title clipped at half-width."
  - id: cal-com-truncation-005
    surface: booking-page
    category: truncation
    primitive: shrink_container
    selector: "[data-testid='available-times']"
    params: { width_pct: 0.5 }
    expected_change: "Available-times column clipped at half-width, right pills hidden."
  - id: cal-com-truncation-006
    surface: bookings-list
    category: truncation
    primitive: shrink_container
    selector: "[data-testid='booking-title'], [data-testid='booking-item'] h3"
    params: { width_pct: 0.5 }
    expected_change: "Booking titles in list clipped at half-width."
  - id: cal-com-truncation-007
    surface: bookings-list
    category: truncation
    primitive: shrink_container
    selector: "[data-testid='booking-attendees'], [data-testid='attendees-list']"
    params: { width_pct: 0.5 }
    expected_change: "Booking attendees list clipped at half-width."
  - id: cal-com-truncation-008
    surface: admin-settings
    category: truncation
    primitive: shrink_container
    selector: "form input[name='name'], [data-testid='org-name-input']"
    params: { width_pct: 0.5 }
    expected_change: "Admin settings 'Organization name' input clipped at half-width."

  # ----- ZORDER (9) -------------------------------------------------------
  - id: cal-com-zorder-001
    surface: login
    category: zorder
    primitive: swap_zindex
    selector: "[data-testid='login-form']"
    selector_b: ".auth-container, main"
    expected_change: "Login form and auth container stacking inverted."
  - id: cal-com-zorder-002
    surface: event-types
    category: zorder
    primitive: swap_zindex
    selector: "[data-testid='event-type-card']:first-of-type"
    selector_b: "[data-testid='event-type-card']:nth-of-type(2)"
    expected_change: "First two event-type cards stacking swapped."
  - id: cal-com-zorder-003
    surface: event-types
    category: zorder
    primitive: swap_zindex
    selector: "header, [data-testid='dashboard-shell-header']"
    selector_b: "main, [data-testid='dashboard-shell-main']"
    expected_change: "Dashboard header and main content stacking inverted."
  - id: cal-com-zorder-004
    surface: booking-page
    category: zorder
    primitive: swap_zindex
    selector: "[data-testid='event-meta'], .booker-event-meta"
    selector_b: "[data-testid='available-times']"
    expected_change: "Booking event-meta and time-slot column stacking swapped."
  - id: cal-com-zorder-005
    surface: booking-page
    category: zorder
    primitive: swap_zindex
    selector: "[data-testid='day-picker'], [data-testid='calendar-grid']"
    selector_b: "[data-testid='available-times']"
    expected_change: "Date picker and time-slot column stacking swapped."
  - id: cal-com-zorder-006
    surface: booking-page
    category: zorder
    primitive: swap_zindex
    selector: "[data-testid='timezone-select']"
    selector_b: "[data-testid='time-format-toggle']"
    expected_change: "Booker timezone selector and time-format toggle stacking swapped."
  - id: cal-com-zorder-007
    surface: bookings-list
    category: zorder
    primitive: swap_zindex
    selector: "[data-testid='booking-item']:first-of-type"
    selector_b: "[data-testid='booking-item']:nth-of-type(2)"
    expected_change: "First two booking rows stacking swapped."
  - id: cal-com-zorder-008
    surface: admin-settings
    category: zorder
    primitive: swap_zindex
    selector: "[data-testid='vertical-tab-Settings']"
    selector_b: "main"
    expected_change: "Settings sidenav and main content stacking inverted."
  - id: cal-com-zorder-009
    surface: admin-settings
    category: zorder
    primitive: swap_zindex
    selector: "form .form-group:nth-of-type(1), form > div:nth-of-type(1)"
    selector_b: "form .form-group:nth-of-type(2), form > div:nth-of-type(2)"
    expected_change: "First and second settings form sections stacking swapped."

  # ----- CONTRAST (9) -----------------------------------------------------
  - id: cal-com-contrast-001
    surface: login
    category: contrast
    primitive: reduce_contrast
    selector: "[data-testid='login-form'] label"
    params: { target_ratio: 2.5 }
    expected_change: "Login form labels contrast pushed below 3:1."
  - id: cal-com-contrast-002
    surface: event-types
    category: contrast
    primitive: reduce_contrast
    selector: "[data-testid='event-type-card'] p, [data-testid='event-type-card'] .text-subtle"
    params: { target_ratio: 2.5 }
    expected_change: "Event-type card descriptions contrast below WCAG AA."
  - id: cal-com-contrast-003
    surface: event-types
    category: contrast
    primitive: reduce_contrast
    selector: "[data-testid='event-type-card'] [data-testid='url'], [data-testid='event-type-card'] code"
    params: { target_ratio: 2.0 }
    expected_change: "Event-type URL slugs near-illegible."
  - id: cal-com-contrast-004
    surface: booking-page
    category: contrast
    primitive: reduce_contrast
    selector: "[data-testid='event-meta'] .description, [data-testid='event-meta'] p"
    params: { target_ratio: 2.5 }
    expected_change: "Booking page event description contrast below 3:1."
  - id: cal-com-contrast-005
    surface: booking-page
    category: contrast
    primitive: reduce_contrast
    selector: "[data-testid='time']"
    params: { target_ratio: 2.5 }
    expected_change: "Time-slot pill labels near-illegible."
  - id: cal-com-contrast-006
    surface: booking-page
    category: contrast
    primitive: reduce_contrast
    selector: "[data-testid='timezone-select'], [data-testid='time-format-toggle']"
    params: { target_ratio: 2.5 }
    expected_change: "Timezone selector + time-format toggle labels contrast below WCAG AA."
  - id: cal-com-contrast-007
    surface: bookings-list
    category: contrast
    primitive: reduce_contrast
    selector: "[data-testid='booking-attendees'], [data-testid='attendees-list']"
    params: { target_ratio: 2.5 }
    expected_change: "Booking attendees list contrast below 3:1."
  - id: cal-com-contrast-008
    surface: bookings-list
    category: contrast
    primitive: reduce_contrast
    selector: "[data-testid='booking-time'], [data-testid='booking-item'] time"
    params: { target_ratio: 2.0 }
    expected_change: "Booking time labels in list near-illegible."
  - id: cal-com-contrast-009
    surface: admin-settings
    category: contrast
    primitive: reduce_contrast
    selector: "form label"
    params: { target_ratio: 2.5 }
    expected_change: "Admin settings form labels contrast below WCAG AA."
