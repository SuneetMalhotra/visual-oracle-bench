# apps/excalidraw/docker-compose.yml
#
# Brings up a single Excalidraw SPA container for screenshot capture.
# There is no backend, no database, no seed-data import endpoint:
# Excalidraw is a single-user IndexedDB-backed canvas tool. The
# "seed" is performed by the capture script (or apps/excalidraw/seed.ts)
# via Playwright's addInitScript injecting the scene JSON into
# localStorage BEFORE the SPA bootstraps.
#
# Upstream pin (immutable digest, NOT moving tag):
#   excalidraw = excalidraw/excalidraw @
#                sha256:f7ee194addd607bf831d2af0f0a34463dd4225e426cf35199ef0b12a803398e9
#                (pushed 2026-05-06)
#
# Usage:
#   docker compose -f apps/excalidraw/docker-compose.yml up --build -d
#   npx tsx apps/excalidraw/seed.ts            # optional pre-warm of fixture
#   <run tests/smoke_excalidraw_pipeline.ts>
#   docker compose -f apps/excalidraw/docker-compose.yml down -v

services:
  excalidraw:
    build:
      context: .
      dockerfile: Dockerfile
    image: voracle/excalidraw:pinned
    container_name: voracle-excalidraw
    ports:
      - "5500:80"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
